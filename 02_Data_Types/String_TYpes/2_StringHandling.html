<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function verify() {
            var userName = document.getElementById('txt').value;
            var msg = document.getElementById('msg');

            if (userName.length >= 4 && userName.length <= 10) {
                msg.innerHTML = 'User Name Verified'.fontcolor('green').italics();
            } else {
                msg.innerHTML = 'User Details must be 4 to 10 charecters only'.fontcolor('red').italics();
            }
        }
    </script>
</head>

<body>
    <h1>Register User</h1>
    <dl>
        <dt>User Name</dt>
        <dd><input type="text" id="txt" onkeyup="verify()"></dd>
        <div id="msg"></div>
    </dl>
    <button onsubmit="verify()">Submit</button>
</body>

</html>
